# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Local development with FastAPI + PostgreSQL
#
# Start everything:   docker compose up
# Stop everything:    docker compose down
# Rebuild API image:  docker compose up --build
# Reset database:     docker compose down -v  (WARNING: deletes all data)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine        # small official PostgreSQL image
    restart: unless-stopped
    environment:
      POSTGRES_USER:     shiftiq
      POSTGRES_PASSWORD: shiftiq_dev  # local dev only — never use in production
      POSTGRES_DB:       shiftiq
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists between restarts
    ports:
      - "5432:5432"      # expose to host so you can connect with psql or TablePlus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ShiftIQ FastAPI backend ────────────────────────────────────────────────
  api:
    build: .                         # uses the Dockerfile in this directory
    restart: unless-stopped
    ports:
      - "8000:8000"      # visit http://localhost:8000 or /docs
    environment:
      # Points the API at the postgres service above.
      # "db" resolves to the postgres container on the internal Docker network.
      DATABASE_URL: postgresql://shiftiq:shiftiq_dev@db:5432/shiftiq
      PORT: 8000
      SECRET_KEY: dev-secret-not-for-production
    depends_on:
      db:
        condition: service_healthy   # wait for PostgreSQL to be ready first

# ── Named volume (data survives docker compose down) ──────────────────────────
volumes:
  postgres_data:
